version: 2
project_name: trindex

before:
  hooks:
    - go mod tidy
    - sh -c 'bash scripts/update-marketplace-version.sh $(git describe --tags --exact-match 2>/dev/null || echo "v0.0.0")'

builds:
  - id: trindex
    main: ./cmd/trindex
    binary: trindex
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/dbehnke/trindex/internal/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "trindex_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: dbehnke
    name: trindex
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
